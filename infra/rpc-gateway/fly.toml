# fly deploy --config infra/rpc-gateway/fly.toml --dockerfile infra/rpc-gateway/Dockerfile
app = "vampchains-rpc-gateway"
primary_region = "iad"

[build]

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [services.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
